
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Regal Honda Employee Marketplace</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

  <!-- ADMIN LOGIN OVERLAY -->
  <div class="overlay" id="adminLoginOverlay" style="display: none;">
    <div class="modal">
      <div class="modal-h">
        <strong>Admin Login</strong>
      </div>
      <div class="modal-b">
        <div class="field">
          <label>Admin Email</label>
          <input id="adminLoginEmail" type="email" placeholder="first.last@regallakeland.com" autocomplete="username" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="adminLoginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="modal-actions" style="padding:0; border:0; justify-content:flex-start">
          <button class="btn primary" id="adminLoginButton">Login</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ADMIN APP -->
  <header class="topbar">
    <div class="left">
      <div class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">Regal Honda</span>
      </div>
      <div class="title">
        <div class="h1">Admin Console</div>
        <div class="h2">Employee Marketplace</div>
      </div>
    </div>
    <div class="right">
      <span class="pill" id="pillUser">Not signed in</span>
      <a class="btn ghost" href="../">Return to Marketplace</a>
      <button class="btn danger" id="btnLogout">Logout</button>
    </div>
  </header>

  <main class="layout" style="display:block; padding: 20px;">
    
    <section class="panel">
        <div class="panel-h"><div class="panel-title">Manage Posts</div><div class="meta" id="countLine">0 posts</div></div>
        <div class="panel-b">
            <div class="filters">
                <div class="field"><label>Search Posts</label><input id="q" placeholder="Search title, email…"></div>
                <div class="field"><label>Board</label><select id="board"><option value="ALL">All</option><option value="FREE">Free Items</option><option value="BUYSELL">Buy / Sell</option><option value="GARAGE">Garage Sales</option><option value="EVENTS">Events</option><option value="WORK">Work News</option><option value="SERVICES">Local Services</option></select></div>
            </div>
            <div id="tableWrap" style="overflow-x: auto;"></div>
        </div>
    </section>

    <div style="height: 30px;"></div>

    <section class="panel">
        <div class="panel-h"><div class="panel-title">Manage Users</div><div class="meta" id="userCountLine">0 users</div></div>
        <div class="panel-b">
            <div class="filters">
                <div class="field"><label>Search Users</label><input id="uq" placeholder="Search name, email, UID…"></div>
            </div>
            <div id="usersWrap" style="overflow-x: auto;"></div>
        </div>
    </section>

  </main>
  
  <script type="module" src="admin.js"></script>
</body>
</html>
