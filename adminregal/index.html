<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Portal • Regal Marketplace</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div id="bg" class="bg" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">RH</div>
      <div class="brand-text">
        <div class="brand-title">Admin Portal</div>
        <div class="brand-sub">Moderation • Requires admin login</div>
      </div>
    </div>
    <div class="topbar-actions">
      <div id="authPill" class="pill pill-muted">Not signed in</div>
      <a class="btn" href="../">Back to Marketplace</a>
    </div>
  </header>

  <main class="layout" style="grid-template-columns:1fr;">
    <section class="content">
      <div class="panel content-panel">
        <div class="content-head">
          <div>
            <div class="panel-title">Moderation</div>
            <div class="muted" id="adminStatus">Loading…</div>
          </div>
          <div class="filters">
            <select id="filterBoard" class="input">
              <option value="all">All boards</option>
              <option value="free">Free Items</option>
              <option value="sell">Buy / Sell</option>
              <option value="garage">Garage Sales</option>
              <option value="events">Events</option>
              <option value="work">Work News</option>
            </select>
            <select id="filterStatus" class="input">
              <option value="all">All</option>
              <option value="active">Active</option>
              <option value="closed">Closed</option>
            </select>
          </div>
        </div>
        <div id="adminFeed" class="feed"></div>
      </div>

      <div class="panel" style="margin-top:14px;">
        <div class="panel-title">Notes</div>
        <div class="muted small">
          GitHub Pages cannot reliably capture visitor IP addresses. IP ban requires a backend (Cloud Functions / server).
        </div>
      </div>
    </section>
  </main>

  <!-- Auth modal reused from main page (simpler) -->
  <div id="authModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">Admin Login</div>
        <button id="authClose" class="icon-btn" type="button" aria-label="Close">✕</button>
      </div>
      <div id="authNotice" class="notice"></div>
      <label class="label">Work Email</label>
      <input id="loginEmail" class="input" placeholder="name@regallakeland.com" autocomplete="username" />
      <label class="label">Password</label>
      <input id="loginPass" class="input" type="password" placeholder="••••••••" autocomplete="current-password" />
      <div class="row">
        <button id="btnLogin" class="btn btn-primary" type="button">Login</button>
        <button id="btnForgot" class="btn btn-ghost" type="button">Forgot password</button>
      </div>
    </div>
  </div>

  <script src="../firebase-config.js"></script>
  <script type="module" src="./admin.js"></script>
</body>
</html>
