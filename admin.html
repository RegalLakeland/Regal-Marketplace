<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Regal Employee Marketplace Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg bg1"></div>
  <div class="bg bg2"></div>
  <div class="bg bg3"></div>
  <div class="bg-overlay"></div>

  <header class="topbar">
    <div class="brand-wrap">
      <div class="logo">RH</div>
      <div>
        <div class="brand-title">Admin Portal</div>
        <div class="brand-sub">Posts · Users · Moderation</div>
      </div>
    </div>
    <div class="row">
      <span id="adminUser" class="pill">Admin</span>
      <a class="btn" href="index.html">Back</a>
    </div>
  </header>

  <main class="shell" style="grid-template-columns:1fr">
    <div class="smallStats">
      <div class="card stat"><div class="statLabel">Total Posts</div><div id="statPosts">0</div></div>
      <div class="card stat"><div class="statLabel">Users</div><div id="statUsers">0</div></div>
      <div class="card stat"><div class="statLabel">Reports</div><div id="statReports">0</div></div>
      <div class="card stat"><div class="statLabel">Pinned</div><div id="statPinned">0</div></div>
    </div>

    <div class="two-admin" style="margin-top:16px">
      <section class="card admin-panel">
        <div class="side-title">Posts</div>
        <div id="postAdminWrap"></div>
      </section>
      <section class="card admin-panel">
        <div class="side-title">Users</div>
        <div id="userAdminWrap"></div>
      </section>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
