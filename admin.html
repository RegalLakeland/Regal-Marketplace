<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Regal Employee Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
    </header>
    <main>
        <div class="container">
            <aside class="sidebar">
                <h3>Menu</h3>
                <ul>
                    <li class="active" data-target="dashboard">Dashboard</li>
                    <li data-target="users">Users</li>
                    <li data-target="items">Items</li>
                </ul>
            </aside>
            <section id="dashboard" class="admin-section">
                <h2>Dashboard</h2>
                <p>Welcome to the admin panel.</p>
            </section>
            <section id="users" class="admin-section" style="display: none;">
                <h2>Users</h2>
                <div id="user-list"></div>
            </section>
            <section id="items" class="admin-section" style="display: none;">
                <h2>Items</h2>
                <div id="item-list"></div>
            </section>
        </div>
    </main>
    <script type="module" src="admin.js"></script>
</body>
</html>
