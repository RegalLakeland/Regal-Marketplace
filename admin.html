<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Regal Lakeland</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div id="app-container">
        <header class="top-bar">
            <h1>Admin Dashboard</h1>
            <div class="user-controls">
                <a href="index.html" class="btn ghost">Back to Marketplace</a>
                <button id="logout-btn" class="btn danger">Logout</button>
            </div>
        </header>

        <main class="app-layout" id="admin-view" style="display: none;">
            <div class="main-content full-width">
                <div class="panel">
                    <div class="panel-header">
                        <h2>Manage Posts</h2>
                    </div>
                    <div class="panel-body">
                        <ul id="post-list-admin" class="admin-list"></ul>
                    </div>
                </div>
            </div>
        </main>
        
        <div id="admin-login-view" class="modal-overlay" style="display: flex;">
             <div class="modal-container">
                <div class="modal-header">
                    <h2>Admin Login Required</h2>
                </div>
                <div class="modal-body">
                    <p>You must be an administrator to access this page.</p>
                    <p>Please log in with an admin account on the main page first.</p>
                     <a href="index.html" class="btn primary">Go to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
