<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regal Lakeland Marketplace</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="topbar">
  <div class="logo">Regal Marketplace</div>
  <div class="top-actions">
    <span id="pillUser" class="pill">Not signed in</span>
    <button id="btnNew" class="btn primary">Post</button>
    <button id="btnLogout" class="btn">Logout</button>
  </div>
</header>

<main>

<div id="boards" class="boards"></div>

<div class="searchBar">
  <input id="q" placeholder="Search listings">
  <select id="st">
    <option value="ACTIVE">Active</option>
    <option value="SOLD">Sold</option>
    <option value="ALL">All</option>
  </select>

  <select id="sort">
    <option value="NEW">Newest</option>
    <option value="OLD">Oldest</option>
    <option value="PRICE_ASC">Price ↑</option>
    <option value="PRICE_DESC">Price ↓</option>
  </select>
</div>

<h2 id="feedTitle">Marketplace</h2>
<div id="countLine"></div>

<div id="cards" class="cards"></div>
<div id="empty" class="empty">No listings found</div>

</main>

<!-- LOGIN OVERLAY -->

<div id="loginOverlay" class="overlay">

<div class="modal">

<div class="tabs">
<button id="tabLogin" class="active">Login</button>
<button id="tabSignup">Create Account</button>
</div>

<div id="loginPane">

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button id="btnLogin" class="btn primary">Login</button>

<div id="verifyNote" class="note" style="display:none">
Please verify your email before logging in.
</div>

<button id="btnResendVerify" class="btn" style="display:none">
Resend Verification Email
</button>

</div>

<div id="signupPane" style="display:none">

<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">
<input id="signupPassword2" type="password" placeholder="Confirm Password">

<button id="btnSignup" class="btn primary">Create Account</button>

<div id="signupMsg" class="note"></div>

</div>

</div>

</div>

<!-- NAME OVERLAY -->

<div id="nameOverlay" class="overlay" style="display:none">

<div class="modal">
<h3>Enter Display Name</h3>

<input id="displayNameInput">

<button id="btnSaveName" class="btn primary">Save</button>

</div>

</div>

<!-- POST OVERLAY -->

<div id="postOverlay" class="overlay" style="display:none">

<div class="modal wide">

<h3>Create Listing</h3>

<input id="fTitle" placeholder="Title">
<textarea id="fDesc" placeholder="Description"></textarea>

<select id="fBoard">
<option value="FREE">Free Items</option>
<option value="BUYSELL">Buy / Sell</option>
<option value="GARAGE">Garage Sales</option>
<option value="EVENTS">Events</option>
<option value="WORK">Work News</option>
<option value="SERVICES">Local Services</option>
</select>

<select id="fStatus">
<option value="ACTIVE">Active</option>
<option value="SOLD">Sold</option>
</select>

<input id="fLocation" placeholder="Location">
<input id="fContact" placeholder="Contact">
<input id="fPrice" placeholder="Price">

<input id="fPhoto" type="file">

<button id="btnSavePost" class="btn primary">Post Listing</button>

<button data-close="postOverlay" class="btn">Cancel</button>

</div>

</div>

<!-- THREAD OVERLAY -->

<div id="threadOverlay" class="overlay" style="display:none">

<div class="modal wide">

<h3 id="threadTitle">Thread</h3>
<div id="threadMeta"></div>

<div id="threadBody"></div>

<div id="threadReplies"></div>

<textarea id="replyText" placeholder="Write a reply"></textarea>

<button id="btnSendReply" class="btn primary">Send Reply</button>
<button data-close="threadOverlay" class="btn">Close</button>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
