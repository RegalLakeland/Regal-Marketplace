
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Regal Employee Marketplace</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="slideshow">
<img src="Images/regal1.jpg">
<img src="Images/regal2.jpg">
<img src="Images/regal3.jpg">
</div>

<header>
<div class="logo">RH</div>
<h1>Regal Employee Marketplace</h1>

<div class="header-right">
<span id="userDisplay"></span>
<button id="postBtn">+ Post</button>
<a href="admin.html" id="adminLink" class="hidden">Admin</a>
</div>
</header>

<div class="container">

<aside class="boards">
<h3>Boards</h3>
<button class="board active">All</button>
<button class="board">Free Items</button>
<button class="board">Buy / Sell</button>
<button class="board">Garage Sales</button>
<button class="board">Events</button>
<button class="board">Work News</button>
<button class="board">Local Services</button>
</aside>

<main id="feed"></main>

</div>

<div id="postModal" class="modal hidden">
<div class="modal-box">
<h2>Create Post</h2>
<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<select id="category">
<option>Free Items</option>
<option>Buy / Sell</option>
<option>Garage Sales</option>
<option>Events</option>
<option>Work News</option>
<option>Local Services</option>
</select>
<textarea id="desc" placeholder="Description"></textarea>
<input type="file" id="imageUpload">
<button onclick="createPost()">Post</button>
<button onclick="closePost()">Cancel</button>
</div>
</div>

<div id="threadModal" class="modal hidden">
<div class="modal-box">
<h2 id="threadTitle"></h2>
<div id="threadComments"></div>
<textarea id="replyText" placeholder="Write reply"></textarea>
<button onclick="sendReply()">Reply</button>
<button onclick="closeThread()">Close</button>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
