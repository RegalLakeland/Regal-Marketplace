
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regal Employee Marketplace</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="bg">
<div class="slide" style="background-image:url('./Images/regal1.jpg')"></div>
<div class="slide" style="background-image:url('./Images/regal2.jpg')"></div>
<div class="slide" style="background-image:url('./Images/regal3.jpg')"></div>
</div>

<header class="topbar">
<div class="brand">
<div class="logo">RH</div>
<h1>Regal Employee Marketplace</h1>
</div>

<div class="top-actions">
<button id="newPost">+ Post</button>
</div>
</header>

<div class="layout">

<aside class="sidebar">
<h3>Boards</h3>
<ul id="boards">
<li data-board="all" class="active">All</li>
<li data-board="free">Free Items</li>
<li data-board="sell">Buy / Sell</li>
<li data-board="garage">Garage Sales</li>
<li data-board="events">Events</li>
<li data-board="work">Work News</li>
</ul>
</aside>

<main class="feed">

<div id="postModal" class="modal hidden">
<div class="modal-box">
<h2>Create Post</h2>
<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<textarea id="desc" placeholder="Description"></textarea>

<select id="boardSelect">
<option value="free">Free Items</option>
<option value="sell">Buy / Sell</option>
<option value="garage">Garage Sales</option>
<option value="events">Events</option>
<option value="work">Work News</option>
</select>

<button id="savePost">Post</button>
<button id="closePost">Cancel</button>
</div>
</div>

<div id="posts" class="cards"></div>

</main>

</div>

<script src="app.js"></script>
</body>
</html>
