<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regal Employee Marketplace</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="bg">
<img src="Images/regal1.jpg">
<img src="Images/regal2.jpg">
<img src="Images/regal3.jpg">
</div>

<header>

<h1>Regal Employee Marketplace</h1>

<div class="nav">

<button id="marketBtn">Marketplace</button>
<button id="forumBtn">Forum</button>
<button id="createPostBtn">Create Post</button>
<button id="adminBtn" style="display:none;">Admin</button>
<button id="logoutBtn">Logout</button>

</div>

</header>


<section id="loginSection">

<h2>Employee Login</h2>

<input id="emailInput" placeholder="Work Email">
<input id="passwordInput" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button id="signupBtn">Create Account</button>
<button id="resetBtn">Forgot Password</button>

</section>


<main id="appSection" style="display:none;">

<div id="marketplace"></div>

<div id="forum" style="display:none">

<h2>Sections</h2>

<div class="forumSection">Free Items</div>
<div class="forumSection">Buy / Sell</div>
<div class="forumSection">Garage Sales</div>
<div class="forumSection">Events</div>
<div class="forumSection">Work News</div>
<div class="forumSection">Services</div>

</div>

</main>


<div id="postModal" class="modal">

<div class="modalBox">

<h2>Create Post</h2>

<input id="titleInput" placeholder="Title">
<textarea id="descInput" placeholder="Description"></textarea>
<input id="priceInput" placeholder="Price (blank = FREE)">
<input id="imageUpload" type="file">

<button id="publishPostBtn">Publish</button>
<button id="closeModalBtn">Cancel</button>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
