<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regal Lakeland Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Slideshow -->
    <div class="slideshow">
        <div class="slideshow-image" style="background-image: url('Images/background1.jpg');"></div>
        <div class="slideshow-image" style="background-image: url('Images/background2.jpg');"></div>
        <div class="slideshow-image" style="background-image: url('Images/background3.jpg');"></div>
    </div>
    <div class="overlay"></div>

    <!-- Login / Signup View -->
    <div id="auth-view">
        <div class="auth-container">
            <div class="auth-header">
                <div class="logo">RL</div>
                <h1>Regal Lakeland Marketplace</h1>
                <p>Please sign in or create an account.</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <input type="email" id="login-email" placeholder="username@regallakeland.com" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn primary">Login</button>
                <a href="#" id="forgot-password-link">Forgot Password?</a>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form">
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="username@regallakeland.com" required>
                <input type="password" id="signup-password" placeholder="Create Password" required>
                <button type="submit" class="btn primary">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Main Application View -->
    <div id="main-view" style="display: none;">
        <header>
            <div class="header-content">
                <div class="logo-main">RL</div>
                <nav>
                    <div id="user-display"></div>
                    <button id="create-post-btn" class="btn primary">+ Create Post</button>
                    <button id="admin-dashboard-btn" class="btn secondary" style="display: none;">Admin</button>
                    <button id="logout-btn" class="btn danger">Logout</button>
                </nav>
            </div>
        </header>

        <main class="container">
            <div class="main-header">
                <h1 id="content-title">All Items</h1>
                <div class="view-toggle">
                    <span>Grid</span>
                    <label class="switch">
                        <input type="checkbox" id="view-toggle-switch">
                        <span class="slider round"></span>
                    </label>
                    <span>Forum</span>
                </div>
            </div>
            <div class="main-content">
                 <aside class="sidebar">
                    <h3>Categories</h3>
                    <ul id="category-list">
                        <li data-category="all" class="active">All Items</li>
                        <li data-category="for-sale">For Sale</li>
                        <li data-category="free-items">Free Items</li>
                        <li data-category="garage-sale">Garage Sales</li>
                        <li data-category="services">Services</li>
                        <li data-category="events">Events</li>
                        <li data-category="announcements">Announcements</li>
                    </ul>
                </aside>
                <section id="content-area" class="marketplace-grid">
                    <!-- Posts will be loaded here -->
                </section>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="post-modal" class="modal-wrapper"></div>
    <div id="detail-modal" class="modal-wrapper"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
