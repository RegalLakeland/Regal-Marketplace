<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regal Employee Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>RH</h1>
            <div class="header-title">
                <h2>Regal Employee Marketplace</h2>
                <p>Private • Verified work email required</p>
            </div>
        </div>
        <div class="header-right">
            <p id="user-status">Not signed in</p>
            <button id="login-button">Login</button>
        </div>
    </header>

    <main>
        <div class="container">
            <aside class="sidebar">
                <h3>Boards</h3>
                <ul>
                    <li class="active">All</li>
                </ul>
            </aside>
            <section class="marketplace">
                <div class="marketplace-header">
                    <h2>Marketplace</h2>
                    <p><span id="item-count">0</span> shown • <span id="total-count">0</span> total</p>
                </div>
                <div class="controls">
                    <div class="search-bar">
                        <input type="text" placeholder="Search titles, descriptions...">
                    </div>
                    <div class="filter-sort">
                        <div class="filter">
                            <label for="status">Status</label>
                            <select id="status">
                                <option value="active">Active</option>
                                <option value="sold">Sold</option>
                            </select>
                        </div>
                        <div class="sort">
                            <label for="sort">Sort</label>
                            <select id="sort">
                                <option value="pinned-newest">Pinned + Newest</option>
                                <option value="newest">Newest</option>
                                <option value="oldest">Oldest</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div id="item-grid" class="item-grid">
                    <!-- Marketplace items will be injected here by JavaScript -->
                </div>
            </section>
        </div>
    </main>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Login</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="#" id="signup-link">Sign up</a></p>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
