
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regal Employee Marketplace</title>
<link rel="stylesheet" href="styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js" defer></script>
</head>

<body>

<header>
<h1>Regal Lakeland Employee Marketplace</h1>

<div class="nav">
<button onclick="openPost()">+ Post</button>
<button onclick="logout()">Logout</button>
</div>

</header>

<div class="container">

<div id="loginBox" class="card">

<h2>Employee Login</h2>

<input id="first" placeholder="First Name">
<input id="last" placeholder="Last Name">
<input id="email" placeholder="Work Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()" class="primary">Create Account</button>

<hr>

<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="app" style="display:none">

<h2>Marketplace</h2>

<div id="posts"></div>

</div>

<div id="postPanel" class="card" style="display:none">

<h3>Create Listing</h3>

<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<input id="price" placeholder="Price">
<input id="photo" type="file">

<button onclick="createPost()" class="primary">Post Listing</button>

</div>

</div>

</body>
</html>
