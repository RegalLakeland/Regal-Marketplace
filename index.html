
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regal Honda Employee Marketplace</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<div class="brand">Regal Honda Employee Marketplace</div>

<div class="header-right">
<span id="userEmail"></span>
<button id="btnLogout">Logout</button>
</div>
</header>

<div class="container">

<div class="toolbar">
<input id="search" placeholder="Search listings...">
<button id="btnNew">Create Listing</button>
</div>

<div id="cards" class="cards"></div>

</div>

<!-- LOGIN -->

<div class="overlay" id="loginOverlay">
<div class="modal">

<h2>Employee Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button id="btnLogin">Login</button>

</div>
</div>

<!-- CREATE POST -->

<div class="overlay" id="postOverlay" style="display:none">
<div class="modal">

<h2>Create Listing</h2>

<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="photo" type="file">

<textarea id="desc" placeholder="Description"></textarea>

<button id="btnSave">Post</button>

</div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
