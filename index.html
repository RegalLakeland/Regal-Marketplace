<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Regal Employee Marketplace</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
header{background:#020617;padding:15px;border-bottom:1px solid #334155}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#020617;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:10px}
button{padding:8px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:bold}
.primary{background:#22c55e;color:black}
</style>
</head>
<body>

<header>
<h2>Regal Honda Employee Marketplace</h2>
</header>

<div class="container">

<div id="loginBox" class="card">
<h3>Create Account</h3>
<input id="first" placeholder="First Name"><br><br>
<input id="last" placeholder="Last Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button class="primary" onclick="signup()">Create Account</button>

<h3>Login</h3>
<input id="loginEmail" placeholder="Email"><br><br>
<input id="loginPass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<h3>Create Post</h3>
<input id="title" placeholder="Title"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>
<input type="number" id="price" placeholder="Price"><br><br>
<button class="primary" onclick="createPost()">Post</button>

<h3>Marketplace</h3>
<div id="posts"></div>

</div>

</div>

<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
