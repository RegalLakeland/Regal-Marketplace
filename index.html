<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regal Lakeland Marketplace</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">Regal Lakeland Marketplace</div>

    <div class="top-actions">
      <span id="pillUser" class="pill">Not signed in</span>
      <span id="boardPill" class="pill">All</span>
      <a id="adminLink" class="btn" href="#" style="display:none;">Admin</a>
      <button id="btnNew" class="btn primary" style="display:none;" type="button">Post</button>
      <button id="btnLogout" class="btn" style="display:none;" type="button">Logout</button>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1 id="feedTitle">Marketplace</h1>
      <div id="countLine" class="subline">0 shown • 0 total</div>
    </section>

    <section id="boards" class="boards"></section>

    <section class="toolbar">
      <input id="q" type="text" placeholder="Search listings..." />
      <select id="st">
        <option value="ACTIVE">Active</option>
        <option value="SOLD">Sold</option>
        <option value="ALL">All</option>
      </select>
      <select id="sort">
        <option value="NEW">Newest</option>
        <option value="OLD">Oldest</option>
        <option value="PRICE_ASC">Price ↑</option>
        <option value="PRICE_DESC">Price ↓</option>
      </select>
    </section>

    <section id="cards" class="cards"></section>
    <div id="empty" class="empty" style="display:none;">No listings found.</div>
  </main>

  <!-- LOGIN / SIGNUP OVERLAY -->
  <div id="loginOverlay" class="overlay">
    <div class="modal">
      <div class="modal-h">
        <strong>Employee Login</strong>
      </div>

      <div class="tabs">
        <button id="tabLogin" class="active" type="button">Login</button>
        <button id="tabSignup" type="button">Create Account</button>
      </div>

      <div id="loginPane" class="modal-b">
        <div class="field">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="name@regallakeland.com" />
        </div>

        <div class="field">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="Password" />
        </div>

        <div id="verifyNote" class="note" style="display:none;">
          Please verify your email before logging in.
        </div>

        <div class="rowBtns">
          <button id="btnLogin" class="btn primary" type="button">Login</button>
          <button id="btnResendVerify" class="btn" type="button" style="display:none;">Resend Verification Email</button>
        </div>
      </div>

      <div id="signupPane" class="modal-b" style="display:none;">
        <div class="field">
          <label>Email</label>
          <input id="signupEmail" type="email" placeholder="name@regallakeland.com" />
        </div>

        <div class="field">
          <label>Password</label>
          <input id="signupPassword" type="password" placeholder="Create password" />
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input id="signupPassword2" type="password" placeholder="Confirm password" />
        </div>

        <div id="signupMsg" class="note" style="display:none;"></div>

        <div class="rowBtns">
          <button id="btnSignup" class="btn primary" type="button">Create Account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DISPLAY NAME OVERLAY -->
  <div id="nameOverlay" class="overlay" style="display:none;">
    <div class="modal">
      <div class="modal-h">
        <strong>Set Display Name</strong>
      </div>

      <div class="modal-b">
        <div class="field">
          <label>Name</label>
          <input id="displayNameInput" type="text" placeholder="Your name" />
        </div>

        <div class="rowBtns">
          <button id="btnSaveName" class="btn primary" type="button">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CREATE POST OVERLAY -->
  <div id="postOverlay" class="overlay" style="display:none;">
    <div class="modal wide">
      <div class="modal-h">
        <strong>Create Listing</strong>
      </div>

      <div class="modal-b">
        <div class="field">
          <label>Title</label>
          <input id="fTitle" type="text" placeholder="Title" />
        </div>

        <div class="field">
          <label>Description</label>
          <textarea id="fDesc" rows="5" placeholder="Describe the item"></textarea>
        </div>

        <div class="grid2">
          <div class="field">
            <label>Board</label>
            <select id="fBoard">
              <option value="FREE">Free Items</option>
              <option value="BUYSELL">Buy / Sell</option>
              <option value="GARAGE">Garage Sales</option>
              <option value="EVENTS">Events</option>
              <option value="WORK">Work News</option>
              <option value="SERVICES">Local Services</option>
            </select>
          </div>

          <div class="field">
            <label>Status</label>
            <select id="fStatus">
              <option value="ACTIVE">Active</option>
              <option value="SOLD">Sold</option>
            </select>
          </div>
        </div>

        <div class="grid2">
          <div class="field">
            <label>Location</label>
            <input id="fLocation" type="text" placeholder="Lakeland, FL" />
          </div>

          <div class="field">
            <label>Contact</label>
            <input id="fContact" type="text" placeholder="Phone or email" />
          </div>
        </div>

        <div class="grid2">
          <div class="field">
            <label>Price</label>
            <input id="fPrice" type="number" step="0.01" placeholder="0.00" />
          </div>

          <div class="field">
            <label>Photo</label>
            <input id="fPhoto" type="file" accept="image/*" />
          </div>
        </div>

        <div class="rowBtns">
          <button id="btnSavePost" class="btn primary" type="button">Post Listing</button>
          <button class="btn" data-close="postOverlay" type="button">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- THREAD OVERLAY -->
  <div id="threadOverlay" class="overlay" style="display:none;">
    <div class="modal wide">
      <div class="modal-h">
        <strong id="threadTitle">Thread</strong>
      </div>

      <div class="modal-b">
        <div id="threadMeta" class="meta"></div>
        <div id="threadBody"></div>

        <hr />

        <div id="threadReplies"></div>

        <div class="field" style="margin-top:12px;">
          <label>Reply</label>
          <textarea id="replyText" rows="4" placeholder="Write a reply"></textarea>
        </div>

        <div class="rowBtns">
          <button id="btnSendReply" class="btn primary" type="button">Send Reply</button>
          <button class="btn" data-close="threadOverlay" type="button">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
