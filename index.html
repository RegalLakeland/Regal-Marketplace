<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regal Lakeland Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slideshow">
        <div class="slideshow-image"></div>
        <div class="slideshow-image"></div>
        <div class="slideshow-image"></div>
    </div>
    <div class="overlay"></div>

    <div id="app-container">

        <!-- Authentication View -->
        <div id="auth-view">
            <div id="auth-container">
                <div id="login-form">
                    <h2>Login</h2>
                    <input type="email" id="login-email" placeholder="Email (@regallakeland.com)">
                    <input type="password" id="login-password" placeholder="Password">
                    <button id="login-btn">Login</button>
                    <p>Don't have an account? <a href="#" id="show-register">Register</a></p>
                    <p><a href="#" id="forgot-password-link">Forgot Password?</a></p>
                </div>
                <div id="register-form" style="display: none;">
                    <h2>Register</h2>
                    <input type="text" id="register-username" placeholder="Your Name">
                    <input type="email" id="register-email" placeholder="Email (@regallakeland.com)">
                    <input type="password" id="register-password" placeholder="Password">
                    <button id="register-btn">Register</button>
                    <p>Already have an account? <a href="#" id="show-login">Login</a></p>
                </div>
            </div>
        </div>

        <!-- Main Application View -->
        <div id="main-view" style="display: none;">
            <header>
                <div class="user-info">
                    <span id="user-display"></span>
                    <button id="logout-btn">Logout</button>
                    <button id="admin-dashboard-btn" style="display: none;">Admin Dashboard</button>
                </div>
                <h1>Regal Lakeland Marketplace & Forum</h1>
            </header>
            <div class="controls">
                <button id="create-post-btn">Create Post</button>
                <div class="toggle-switch">
                    <span>Forum View</span>
                    <label class="switch">
                        <input type="checkbox" id="view-toggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Marketplace View</span>
                </div>
            </div>
            <div id="content-area" class="marketplace-grid">
                <!-- Posts will be dynamically loaded here -->
            </div>
        </div>

        <!-- Post Detail View -->
        <div id="detail-view" style="display: none;">
            <!-- Detailed post content will be loaded here -->
        </div>
        
        <!-- Admin View -->
        <div id="admin-view" style="display: none;">
            <!-- Admin content will be loaded from admin.html -->
        </div>


    </div>

    <!-- Post Creation/Edit Modal -->
    <div id="post-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Create Post</h2>
            <input type="hidden" id="post-id">
            <input type="text" id="post-title" placeholder="Title">
            <textarea id="post-description" placeholder="Description"></textarea>
            <input type="number" id="post-price" placeholder="Price (leave blank for FREE)">
            <input type="text" id="post-location" placeholder="Location">
            <input type="text" id="post-contact" placeholder="Contact Info (Phone or Email)">
            <select id="post-category">
                <option value="buy-sell">Buy / Sell</option>
                <option value="free">Free Items</option>
                <option value="garage-sale">Garage Sales</option>
                <option value="events">Events</option>
                <option value="work-news">Work News</option>
                <option value="services">Services</option>
            </select>
            <label for="post-images">Upload Images (up to 5):</label>
            <input type="file" id="post-images" multiple accept="image/*">
            <div id="image-previews"></div>
            <button id="save-post-btn">Save Post</button>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
