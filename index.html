<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regal Employee Marketplace Forum</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand-row">
        <div class="brand-logo">RH</div>
        <div>
          <h1>Regal Employee Marketplace</h1>
          <div class="subhead">Forum-style internal marketplace • Option 1</div>
        </div>
      </div>
      <div class="top-actions">
        <button id="homeBtn" class="ghost-btn">Boards</button>
        <button id="newTopicBtn" class="primary-btn">+ New Post</button>
      </div>
    </header>

    <main id="app"></main>
  </div>

  <div id="composeModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Create Thread</h2>
        <button id="closeComposeBtn" class="ghost-btn small">Close</button>
      </div>

      <div class="form-grid">
        <label>
          <span>Section</span>
          <select id="composeSection"></select>
        </label>

        <label>
          <span>Your Name</span>
          <input id="composeAuthor" placeholder="Michael Hall" />
        </label>

        <label class="full">
          <span>Thread Title</span>
          <input id="composeTitle" placeholder="Honda Civic tires for sale" />
        </label>

        <label class="full">
          <span>Description</span>
          <textarea id="composeBody" rows="6" placeholder="Write the listing, event, or work update here..."></textarea>
        </label>

        <label>
          <span>Price</span>
          <input id="composePrice" placeholder="Leave blank for FREE / N/A" />
        </label>

        <label>
          <span>Location</span>
          <input id="composeLocation" placeholder="Lakeland" />
        </label>

        <label class="full">
          <span>Contact</span>
          <input id="composeContact" placeholder="Phone, email, department, or where to find you" />
        </label>
      </div>

      <div class="modal-footer">
        <button id="saveTopicBtn" class="primary-btn">Post Thread</button>
      </div>
    </div>
  </div>

  <div id="replyModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Add Reply</h2>
        <button id="closeReplyBtn" class="ghost-btn small">Close</button>
      </div>

      <div class="form-grid">
        <label>
          <span>Your Name</span>
          <input id="replyAuthor" placeholder="Michael Hall" />
        </label>

        <label class="full">
          <span>Reply</span>
          <textarea id="replyBody" rows="5" placeholder="Write your reply..."></textarea>
        </label>
      </div>

      <div class="modal-footer">
        <button id="saveReplyBtn" class="primary-btn">Post Reply</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
